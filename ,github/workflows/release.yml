name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        os: [windows, linux, darwin]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        run: |
          if [ "${{ matrix.os }}" = "windows" ]; then
            GOOS=windows GOARCH=amd64 go build -o repomover-windows.exe
          else
            GOOS=${{ matrix.os }} GOARCH=amd64 go build -o repomover-${{ matrix.os }}
          fi

      - name: Upload Release
        uses: softprops/action-gh-release@v1
        with:
          files: repomover-*